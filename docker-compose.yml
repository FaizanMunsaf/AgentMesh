services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./claims.db
      - BAND_API_KEY=${BAND_API_KEY:-}
      - BAND_AGENT_ID=${BAND_AGENT_ID:-}
    volumes:
      - ./backend:/app
      - ./backend/decision_log:/app/decision_log
